<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NEWLY MUSIUM — 音声キュー卓</title>

<!-- ホーム画面追加（PWA）対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEWLY MUSIUM">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15171a">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#15171a;
    --panel:#1d2024;
    --panel-edge:#2a2e33;
    --cue-red:#ff3b30;
    --cue-amber:#f0a838;
    --text:#e9ebec;
    --text-dim:#83898f;
    --mono: 'Consolas', 'Menlo', 'Courier New', monospace;
    --disp: 'Arial Black', 'Arial Bold', 'Helvetica Neue', sans-serif;
    --jp: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', 'Meiryo', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(ellipse at top, #1c2024 0%, var(--bg) 60%);
    color:var(--text);
    font-family:var(--jp);
    -webkit-font-smoothing:antialiased;
  }
  body{ display:flex; flex-direction:column; min-height:100vh; }

  /* ---- Header / console rail ---- */
  header{
    padding:22px 28px 16px;
    border-bottom:1px solid var(--panel-edge);
    display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:baseline; gap:12px; }
  .brand .led{
    width:9px; height:9px; border-radius:50%;
    background:var(--cue-red);
    box-shadow:0 0 8px 2px rgba(255,59,48,.55);
    display:inline-block; margin-right:2px;
    animation:blink 2.6s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  h1{
    font-family:var(--disp); font-weight:700; letter-spacing:.06em;
    font-size:23px; margin:0; text-transform:uppercase;
  }
  .sub{ font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:.08em; }

  .console-controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn{
    font-family:var(--jp); font-weight:500; font-size:13px;
    background:var(--panel); color:var(--text);
    border:1px solid var(--panel-edge); border-radius:6px;
    padding:9px 16px; cursor:pointer; transition:.15s ease;
    display:inline-flex; align-items:center; gap:7px;
  }
  .btn:hover{ border-color:#3a3f45; background:#222629; }
  .btn.primary{ border-color:var(--cue-amber); color:var(--cue-amber); }
  .btn.primary:hover{ background:rgba(240,168,56,.08); }
  label.btn.primary[for="fileInput"]{
    background:#2563eb; color:#fff;
    border-color:#2563eb;
  }
  label.btn.primary[for="fileInput"]:hover{ background:#1d4ed8; border-color:#1d4ed8; }
  .btn.stop{ background:var(--cue-red); border-color:var(--cue-red); color:#fff; }
  .btn.stop:hover{ background:#dc2626; border-color:#dc2626; }
  #newBtn{ border-color:var(--cue-amber); color:var(--cue-amber); }
  #newBtn:hover{ background:rgba(240,168,56,.08); }
  input[type=file]{ display:none; }

  .master{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; color:var(--text-dim); }
  input[type=range]{ accent-color:var(--cue-amber); width:90px; }

  /* ---- Drop zone hint ---- */
  #dropHint{
    margin:18px 28px 0; padding:14px 18px;
    border:1px dashed var(--panel-edge); border-radius:8px;
    color:var(--text-dim); font-size:12.5px; font-family:var(--mono);
    text-align:center; letter-spacing:.02em;
  }

  /* ---- Pad grid ---- */
  main{ flex:1; padding:22px 28px 40px; }
  #grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:14px;
  }

  .pad{
    position:relative;
    background:linear-gradient(180deg,#ffe3ee 0%,#ffd0e2 100%);
    border:1px solid #f3b8cf;
    border-radius:10px;
    padding:14px 12px 10px;
    min-height:177px;
    display:flex; flex-direction:column; justify-content:flex-start;
    cursor:pointer; user-select:none;
    transition:transform .08s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .pad:hover{ border-color:#e893b8; }
  .pad:active{ transform:scale(.97); }
  .pad.playing{
    background:linear-gradient(180deg,#dbe9ff 0%,#c3daff 100%);
    border-color:var(--cue-red);
    box-shadow:0 0 0 1px var(--cue-red), 0 0 18px -2px rgba(255,59,48,.5);
    animation:pulse 1s ease-in-out infinite;
  }
  .pad.paused-sp{
    border-color:#3b82f6;
    box-shadow:0 0 0 1px #3b82f6, 0 0 14px -2px rgba(59,130,246,.5);
  }
  .pad.paused-sp .key{ color:#3b82f6; border-color:#3b82f6; }
  .pad.paused-sp .wave span{ background:#3b82f6; }
  .pad.fading{ animation:none; opacity:.7; }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 1px var(--cue-red), 0 0 18px -2px rgba(255,59,48,.5); }
    50%{ box-shadow:0 0 0 1px var(--cue-red), 0 0 26px 2px rgba(255,59,48,.75); }
  }

  .pad .drag-handle{
    position:absolute; top:8px; left:30px;
    font-size:14px; color:#e893b8;
    cursor:grab; line-height:1; user-select:none;
    transition:color .15s;
  }
  .pad:hover .drag-handle{ color:#c2447a; }
  .pad.dragging{
    opacity:.35; border-style:dashed;
    transform:scale(.97);
  }
  .pad.drag-over{
    border-color:var(--cue-amber);
    box-shadow:0 0 0 1px var(--cue-amber), 0 0 14px -2px rgba(240,168,56,.5);
  }

  .pad .key{
    position:absolute; top:8px; left:9px;
    font-family:var(--mono); font-size:10px; color:#c2447a;
    border:1px solid #e893b8; border-radius:3px;
    padding:1px 5px; line-height:1.4;
  }
  .pad.playing .key{ color:var(--cue-red); border-color:var(--cue-red); }

  .pad .loopflag{
    position:absolute; top:8px; right:9px;
    font-family:var(--mono); font-size:9px; letter-spacing:.05em;
    color:var(--cue-amber); border:1px solid var(--cue-amber);
    border-radius:3px; padding:1px 4px; opacity:.85;
  }

  .pad .name{
    font-size:17px; font-weight:600; line-height:1.32;
    margin-top:20px; margin-bottom:auto; word-break:break-word;
    white-space:pre-wrap;
    outline:none; color:#5a2038;
  }
  .pad .name:focus{ color:var(--cue-amber); }

  .pad .meta{
    display:flex; align-items:center;
    font-family:var(--mono); font-size:10px; color:#a05070;
    margin-bottom:6px;
  }
  .pad .dur{
    font-size:15px; font-weight:600; letter-spacing:.03em;
    white-space:nowrap; color:#a05070;
  }
  .wave{
    flex:1; height:18px; margin-right:8px;
    display:flex; align-items:flex-end; gap:2px; overflow:hidden;
  }
  .wave span{
    width:3px; background:#e893b8; border-radius:1px;
    height:30%;
    transition:background .15s, height .15s;
  }
  .pad.playing .wave span{ background:var(--cue-red); }

  .pad .padbtns{
    display:flex; gap:5px; align-items:center;
    justify-content:flex-end;
  }
  .micro{
    font-family:var(--mono); font-size:9px; color:#a05070;
    background:transparent; border:1px solid #e893b8;
    border-radius:3px; padding:2px 5px; cursor:pointer; transition:.12s ease;
  }
  .micro:hover{ color:#5a2038; border-color:#c2447a; }
  .micro.del:hover{ color:var(--cue-red); border-color:var(--cue-red); }
  .micro.loopbtn{ display:none; align-items:center; gap:3px; padding:3px 7px; }
  .micro.loopbtn svg{ width:10px; height:10px; }
  .micro.loopbtn.active{
    color:var(--cue-amber); border-color:var(--cue-amber);
    background:rgba(240,168,56,.1);
    box-shadow:0 0 6px -1px rgba(240,168,56,.4);
  }

  #empty{
    text-align:center; padding:60px 20px; color:var(--text-dim);
    font-family:var(--mono); font-size:12.5px; line-height:2;
  }
  #empty b{ color:var(--text); font-family:var(--jp); }

  #lockBtn.locked{
    border-color: var(--cue-amber);
    background: rgba(240,168,56,.1);
    box-shadow: 0 0 8px -1px rgba(240,168,56,.4);
  }
  body.locked .console-controls > *:not(#lockBtn):not(#stopAll){
    opacity: .3;
    pointer-events: none;
    user-select: none;
  }
  body.locked .pad .padbtns{
    opacity: .3;
    pointer-events: none;
  }
  body.locked .pad .name[contenteditable]{
    pointer-events: none;
  }

  footer{
    padding:12px 28px; border-top:1px solid var(--panel-edge);
    font-family:var(--mono); font-size:10.5px; color:var(--text-dim);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px;
  }

  /* ---- Mobile ---- */
  @media (max-width: 768px){
    header{
      padding:14px 14px 12px;
      flex-direction:column; align-items:flex-start; gap:10px;
    }
    h1{ font-size:19px; }
    .sub{ display:none; }

    /* --- モバイル共通ボタンリセット：塗りつぶしスタイルに --- */
    .btn{
      border-radius:8px;
      padding:11px 10px;
      font-size:13px;
      font-weight:700;
      border-width:0;
      /* デフォルト：明るいグレー地 */
      background:#3a3f47;
      color:#e9ebec;
    }
    .btn:hover, .btn:active{ background:#464d57; border-width:0; }

    /* 読み込む・音声を読み込む：青 */
    label[for="fileInput"]{
      background:#2563eb;
      color:#fff;
    }
    label[for="fileInput"]:hover, label[for="fileInput"]:active{ background:#1d4ed8; }

    /* 全停止：赤 */
    #stopAll{
      background:#dc2626;
      color:#fff;
      border-width:0;
    }
    #stopAll:hover, #stopAll:active{ background:#b91c1c; }

    /* 新規作成：アンバー系（注意喚起） */
    #newBtn{
      background:rgba(240,168,56,.14);
      color:var(--cue-amber);
      border:1.5px solid var(--cue-amber);
    }
    #newBtn:hover, #newBtn:active{ background:rgba(240,168,56,.22); }


    /* ロック */
    #lockBtn{ background:#3a3f47; color:#e9ebec; }
    #lockBtn.locked{
      background:rgba(240,168,56,.18);
      border:1.5px solid var(--cue-amber);
    }

    /* パッド内マイクロボタン（LOOP / DEL）をスマホでも少し大きく） */
    .micro{
      font-size:9px; padding:3px 6px;
      border-radius:4px;
    }
    .micro.loopbtn{ padding:3px 7px; }
    .micro.loopbtn svg{ width:9px; height:9px; }
    .micro.loopbtn.active{
      background:rgba(240,168,56,.2);
      color:var(--cue-amber);
      border-color:var(--cue-amber);
    }
    .micro.del:active{ background:rgba(255,59,48,.15); color:var(--cue-red); border-color:var(--cue-red); }

    /* パッド本体：タップしやすく枠を少し強調 */
    .pad{
      background:linear-gradient(160deg, #ffe3ee 0%, #ffd0e2 100%);
      border-color:#e893b8;
      min-height:120px; padding:12px 10px 10px;
    }
    .pad .name{ color:#5a2038; font-size:15px; margin-bottom:auto; }
    .pad .key{
      color:#c2447a; border-color:#e893b8;
      background:rgba(194,68,122,.08);
    }
    .pad .drag-handle{ color:#e893b8; }
    .pad:hover .drag-handle{ color:#c2447a; }
    .pad .meta{ color:#a05070; }
    .wave span{ background:#e893b8; }
    .pad .dur{ color:#a05070; font-size:14px; font-weight:600; }

    .pad.playing{
      background:linear-gradient(160deg, #dbe9ff 0%, #c3daff 100%);
      border-color:var(--cue-red);
    }
    .pad.playing .name{ color:#5a2038; }
    .pad.playing .key{ color:var(--cue-red); border-color:var(--cue-red); background:rgba(255,59,48,.1); }
    .pad.playing .wave span{ background:var(--cue-red); }

    .pad.fading{
      background:linear-gradient(160deg, #2a2218 0%, #201a10 100%);
    }

    .console-controls{
      width:100%; display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .console-controls .btn{ justify-content:center; width:100%; }
    .console-controls label.btn{ justify-content:center; }
    .master{
      grid-column:1 / -1;
      justify-content:space-between;
      background:#22262b; border:1px solid var(--panel-edge);
      border-radius:8px; padding:9px 14px;
    }
    .master input[type=range]{ flex:1; }
    #lockBtn.locked{ grid-column:1 / -1; }

    .micro.loopbtn{ display:none; }
    .pad .loopflag{ display:none !important; }
    .pad .name{ pointer-events:none; -webkit-user-select:none; user-select:none; }
    .pad .name[contenteditable]{ outline:none; cursor:default; }

    #dropHint{ margin:12px 14px 0; font-size:11px; padding:10px 12px; }

    main{ padding:14px 14px 32px; }
    #grid{ grid-template-columns:repeat(2,1fr); gap:10px; }
    .pad .name{ font-size:14.5px; margin-top:18px; }
    .pad .drag-handle{ left:24px; font-size:12px; }
    .pad .padbtns{ gap:4px; }

    footer{ padding:10px 14px; font-size:10px; flex-direction:column; gap:3px; }
  }

  /* ---- タッチデバイス（タブレット・スマホ）ではパッド名を編集不可に ----
     JS側の実タッチ判定（maxTouchPoints等）で付与される .touch-device クラスに連動させる。
     hover/pointerメディアクエリだけだとトラックパッド対応タブレット等を誤判定するため使わない。 */
  html.touch-device .pad .name{
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
  }
  html.touch-device .pad .name[contenteditable]{ outline:none; cursor:default; }
  /* タッチ端末ではドラッグ並び替え非対応のため、紛らわしいハンドルを隠す */
  html.touch-device .pad .drag-handle{ display:none; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1><span class="led"></span>NEWLY MUSIUM</h1>
    <span class="sub">produced by Netz Newly Kita-osaka</span>
  </div>
  <div class="console-controls">
    <label class="btn primary" for="fileInput">＋ 音声を読み込む</label>
    <input id="fileInput" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg,.flac,.aiff,.caf,.wma" multiple>
    <button class="btn" id="lockBtn">🔓 ロック</button>
    <button class="btn stop" id="stopAll">■ 全停止</button>
    <button class="btn" id="newBtn" title="すべてのパッドを削除して新規作成">🗑 新規作成</button>
    <div class="master">
      MASTER
      <input type="range" id="masterVol" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="master">
      FADE
      <input type="range" id="fadeTime" min="0" max="2000" step="50" value="400">
      <span id="fadeTimeLabel">400ms</span>
    </div>
  </div>
</header>





<main>
  <div id="grid"></div>
  <div id="empty">
    <b>パッドがまだありません</b><br>
    音声ファイル（mp3 / wav / m4a 等）を読み込むと、ここにキューパッドが並びます。<br>
    パッドはクリック、または割り当てられたキー（1〜9, 0, Q〜...）で即時再生できます。
  </div>
</main>

<footer>
  <span>クリック＝再生・再生中クリック＝停止 / 名前はクリックで編集 / LOOPで繰り返し再生切替</span>
  <span id="count">0 PADS LOADED</span>
</footer>

<script>
(function(){
  // タッチ操作が可能な端末（タブレット・スマホ）かどうかの判定。
  // hover/pointerメディアクエリはトラックパッド対応タブレット等で誤判定することがあるため、
  // 実際のタッチ対応有無（maxTouchPoints等）で判定する。
  const IS_TOUCH_DEVICE = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (navigator.msMaxTouchPoints > 0);
  if(IS_TOUCH_DEVICE) document.documentElement.classList.add('touch-device');

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const fileInput = document.getElementById('fileInput');
  const stopAllBtn = document.getElementById('stopAll');
  const masterVol = document.getElementById('masterVol');
  const fadeTime = document.getElementById('fadeTime');
  const fadeTimeLabel = document.getElementById('fadeTimeLabel');
  const countEl = document.getElementById('count');
  const dropHint = { style:{} }; // dropHint removed

  const KEYS = ['1','2','3','4','5','6','7','8','9','0','q','w','e','r','t','y','u','i','o','p'];
  let pads = []; // {id, name, url, audio, el, loop, key}

  function updateCount(){
    countEl.textContent = pads.length + ' PADS LOADED';
    empty.style.display = pads.length ? 'none' : 'block';
  }

  // ---- 状態の永続化（IndexedDB）----
  // パッドの並び・名前・ループ設定に加え、音声データそのものをブラウザ内に保存しておき、
  // 次回起動時（ブラウザ再起動後も含む）に自動で復元する。
  // File System Access APIと違い許可プロンプトが不要で、Safari/Firefoxを含む全ブラウザで動作する。
  const STATE_DB_NAME = 'pondashi_state';
  const STATE_STORE = 'state';
  const STATE_KEY = 'pads';
  let stateDbPromise = null;

  function openStateDB(){
    if(stateDbPromise) return stateDbPromise;
    stateDbPromise = new Promise(resolve=>{
      try{
        const req = indexedDB.open(STATE_DB_NAME, 1);
        req.onupgradeneeded = ()=>{ req.result.createObjectStore(STATE_STORE); };
        req.onsuccess = ()=> resolve(req.result);
        req.onerror = ()=> resolve(null);
      }catch(e){ resolve(null); }
    });
    return stateDbPromise;
  }

  let saveTimer = null;
  function saveState(){
    // 短時間の連続呼び出しをまとめる（並び替え中の連打などを軽くするため）
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{
      const db = await openStateDB();
      if(!db) return;
      const data = pads.filter(p=>p.fileBlob).map(p=>({
        name: p.name, loop: p.loop, filename: p.origFilename, blob: p.fileBlob
      }));
      try{
        const tx = db.transaction(STATE_STORE, 'readwrite');
        tx.objectStore(STATE_STORE).put(data, STATE_KEY);
      }catch(e){}
    }, 300);
  }

  async function loadState(){
    const db = await openStateDB();
    if(!db) return null;
    return new Promise(resolve=>{
      try{
        const tx = db.transaction(STATE_STORE, 'readonly');
        const req = tx.objectStore(STATE_STORE).get(STATE_KEY);
        req.onsuccess = ()=> resolve(req.result || null);
        req.onerror = ()=> resolve(null);
      }catch(e){ resolve(null); }
    });
  }

  async function clearState(){
    clearTimeout(saveTimer);
    const db = await openStateDB();
    if(!db) return;
    try{
      const tx = db.transaction(STATE_STORE, 'readwrite');
      tx.objectStore(STATE_STORE).delete(STATE_KEY);
    }catch(e){}
  }

  function flashBtn(btn, msg){
    const orig = btn.innerHTML;
    btn.innerHTML = msg;
    btn.disabled = true;
    setTimeout(()=>{ btn.innerHTML = orig; btn.disabled = false; }, 1500);
  }

  function makeWave(){
    let html = '';
    for(let i=0;i<14;i++){
      const h = 20 + Math.round(Math.random()*70);
      html += `<span style="height:${h}%"></span>`;
    }
    return html;
  }

  function hardStop(pad){
    if(pad.fadeFrame){ cancelAnimationFrame(pad.fadeFrame); pad.fadeFrame = null; }
    pad.audio.pause();
    pad.audio.currentTime = 0;
    pad.audio.volume = parseFloat(masterVol.value);
    pad.el.classList.remove('playing');
    pad.el.classList.remove('fading');
    // 残り時間表示を総時間にリセット
    const durEl = pad.el.querySelector('.dur');
    if(durEl && isFinite(pad.audio.duration)){
      const d = pad.audio.duration;
      const m = Math.floor(d/60), s = Math.floor(d%60).toString().padStart(2,'0');
      durEl.textContent = `${m}:${s}`;
      durEl.style.color = '';
    }
  }

  function stopPad(pad, immediate){
    if(pad.audio.paused && !pad.fadeFrame) return;
    const duration = immediate ? 0 : parseInt(fadeTime.value, 10);
    if(!duration){ hardStop(pad); return; }

    if(pad.fadeFrame) cancelAnimationFrame(pad.fadeFrame);
    pad.el.classList.add('fading');
    const startVol = pad.audio.volume;
    const startTime = performance.now();

    function step(now){
      if(pad.audio.paused){ hardStop(pad); return; }
      const t = Math.min(1, (now - startTime) / duration);
      pad.audio.volume = startVol * (1 - t);
      if(t < 1){
        pad.fadeFrame = requestAnimationFrame(step);
      } else {
        hardStop(pad);
      }
    }
    pad.fadeFrame = requestAnimationFrame(step);
  }

  function playPad(pad){
    // 他のパッドが再生中なら即時停止してから再生（切り替え時は重ならない）
    pads.forEach(p=>{
      if(p.id !== pad.id && (!p.audio.paused || p.fadeFrame)) hardStop(p);
      p.el.classList.remove('paused-sp');
    });
    if(pad.fadeFrame){ cancelAnimationFrame(pad.fadeFrame); pad.fadeFrame = null; }
    pad.el.classList.remove('fading');
    pad.audio.currentTime = 0;
    pad.audio.volume = parseFloat(masterVol.value);
    pad.audio.play();
    pad.el.classList.add('playing');
  }

  function togglePad(pad){
    if(pad.audio.paused){
      playPad(pad);       // 新規再生 → 他パッドは即時停止
    } else {
      stopPad(pad);       // 手動停止 → フェードアウト
    }
  }

  // ファイルからパッドを生成して返す（グリッドへの追加・pads配列追加はしない）
  function buildPad(file, overrideName, overrideLoop, insertIndex){
    const url = URL.createObjectURL(file);
    const audio = new Audio(url);
    audio.preload = 'metadata';

    const id = 'pad_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    const key = KEYS[insertIndex !== undefined ? insertIndex : pads.length] || '';
    const baseName = overrideName !== undefined ? overrideName : file.name.replace(/\.[^/.]+$/, '');
    const initLoop = overrideLoop !== undefined ? overrideLoop : false;

    const el = document.createElement('div');
    el.className = 'pad';
    // タッチ専用デバイス（タブレット・スマホ）ではHTML5ドラッグをタップと誤認識することがあるため無効化
    el.draggable = !IS_TOUCH_DEVICE;
    el.innerHTML = `
      <span class="drag-handle" title="ドラッグして移動">⠿</span>
      <span class="key">${key ? key.toUpperCase() : '—'}</span>
      <span class="loopflag" style="${initLoop ? '' : 'display:none;'}">LOOP</span>
      <div class="name" contenteditable="${locked ? 'false' : 'true'}" spellcheck="false">${nameToHtml(baseName)}</div>
      <div class="meta">
        <div class="wave">${makeWave()}</div>
        <span class="dur">--:--</span>
      </div>
      <div class="padbtns">
        <button class="micro loopbtn${initLoop ? ' active' : ''}" title="リピート切替（クリックでON/OFF）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
          LOOP
        </button>
        <button class="micro del" title="削除">DEL</button>
      </div>
    `;

    const pad = { id, name: baseName, origFilename: file.name, url, audio, el, loop: initLoop, key, placeholder: false, fileBlob: file };

    const durEl = el.querySelector('.dur');

    function fmtTime(sec){
      const m = Math.floor(sec/60), s = Math.floor(sec%60).toString().padStart(2,'0');
      return `${m}:${s}`;
    }

    audio.addEventListener('loadedmetadata', ()=>{
      if(isFinite(audio.duration)) durEl.textContent = fmtTime(audio.duration);
    });

    audio.addEventListener('timeupdate', ()=>{
      if(!audio.paused && isFinite(audio.duration)){
        const remaining = audio.duration - audio.currentTime;
        durEl.textContent = '−' + fmtTime(remaining);
        durEl.style.color = remaining < 10 ? 'var(--cue-red)' : '';
      }
    });

    audio.addEventListener('ended', ()=>{
      if(isFinite(audio.duration)) durEl.textContent = fmtTime(audio.duration);
      durEl.style.color = '';
      if(!pad.loop) el.classList.remove('playing');
      else { audio.currentTime = 0; audio.play(); }
    });

    el.addEventListener('click', (e)=>{
      if(e.target.closest('.padbtns') || e.target.classList.contains('name')) return;
      togglePad(pad);
    });

    el.querySelector('.loopbtn').addEventListener('click', (e)=>{
      e.stopPropagation();
      pad.loop = !pad.loop;
      audio.loop = false;
      el.querySelector('.loopflag').style.display = pad.loop ? 'inline-block' : 'none';
      el.querySelector('.loopbtn').classList.toggle('active', pad.loop);
      saveState();
    });

    el.querySelector('.del').addEventListener('click', (e)=>{
      e.stopPropagation();
      hardStop(pad);
      URL.revokeObjectURL(pad.url);
      el.remove();
      pads = pads.filter(p=>p.id!==pad.id);
      reassignKeys();
      updateCount();
      saveState();
    });

    const nameEl = el.querySelector('.name');
    nameEl.addEventListener('click', e=>e.stopPropagation());
    nameEl.addEventListener('blur', ()=>{ pad.name = nameEl.innerText.trim() || baseName; saveState(); });
    nameEl.addEventListener('input', ()=>{ pad.name = nameEl.innerText.trim() || baseName; saveState(); });
    nameEl.addEventListener('keydown', e=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        document.execCommand('insertLineBreak');
      }
    });

    enableDrag(pad);
    return pad;
  }

  function addFile(file){
    const pad = buildPad(file);
    pads.push(pad);
    grid.appendChild(pad.el);
    updateCount();
    saveState();
  }

  // ---- ドラッグ&ドロップ並び替え ----
  let dragSrcId = null;

  function enableDrag(pad){
    const el = pad.el;
    el.addEventListener('dragstart', (e)=>{
      if(e.target.classList.contains('name') || e.target.closest('.padbtns')){
        e.preventDefault(); return;
      }
      dragSrcId = pad.id;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', pad.id);
    });
    el.addEventListener('dragend', ()=>{
      el.classList.remove('dragging');
      document.querySelectorAll('.pad.drag-over').forEach(p=>p.classList.remove('drag-over'));
      dragSrcId = null;
    });
    el.addEventListener('dragover', (e)=>{
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(dragSrcId && dragSrcId !== pad.id) el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', ()=>{ el.classList.remove('drag-over'); });
    el.addEventListener('drop', (e)=>{
      e.preventDefault();
      el.classList.remove('drag-over');
      if(!dragSrcId || dragSrcId === pad.id) return;
      const srcIdx = pads.findIndex(p=>p.id === dragSrcId);
      const dstIdx = pads.findIndex(p=>p.id === pad.id);
      if(srcIdx < 0 || dstIdx < 0) return;
      const [moved] = pads.splice(srcIdx, 1);
      pads.splice(dstIdx, 0, moved);
      if(srcIdx < dstIdx) pad.el.after(moved.el);
      else pad.el.before(moved.el);
      reassignKeys();
      saveState();
    });
  }

  function reassignKeys(){
    pads.forEach((p, i)=>{
      p.key = KEYS[i] || '';
      p.el.querySelector('.key').textContent = p.key ? p.key.toUpperCase() : '—';
    });
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  // 改行を含む名前をパッド表示用HTMLに変換（\n → <br>）
  function nameToHtml(name){
    return escapeHtml(name).split('\n').join('<br>');
  }

  fileInput.addEventListener('change', (e)=>{
    Array.from(e.target.files).forEach(addFile);
    fileInput.value = '';
  });

  // drag & drop on whole page
  ['dragover','dragenter'].forEach(ev=>{
    document.body.addEventListener(ev, e=>{
      e.preventDefault();
      dropHint.style.borderColor = 'var(--cue-amber)';
      dropHint.style.color = 'var(--cue-amber)';
    });
  });
  ['dragleave','drop'].forEach(ev=>{
    document.body.addEventListener(ev, e=>{
      dropHint.style.borderColor = 'var(--panel-edge)';
      dropHint.style.color = 'var(--text-dim)';
    });
  });
  document.body.addEventListener('drop', e=>{
    e.preventDefault();
    if(dragSrcId) return; // パッド並び替え中はファイルD&D無視
    // MIMEタイプが正しく付与されないファイル（一部のクラウド経由ファイル等）にも対応し、
    // 拡張子でも判定するようにする
    const AUDIO_EXT = /\.(mp3|wav|m4a|aac|ogg|flac|aiff|caf|wma)$/i;
    const files = Array.from(e.dataTransfer.files).filter(f=>
      f.type.startsWith('audio/') || AUDIO_EXT.test(f.name)
    );
    files.forEach(addFile);
  });

  stopAllBtn.addEventListener('click', ()=>{
    pads.forEach(p=>stopPad(p));
  });

  const newBtn = document.getElementById('newBtn');
  newBtn.addEventListener('click', ()=>{
    if(!pads.length) return;
    if(!confirm('すべてのパッドを削除して新規作成します。よろしいですか？\n（この操作は元に戻せません）')) return;

    pads.forEach(p=>{
      hardStop(p);
      URL.revokeObjectURL(p.url);
    });
    pads = [];
    grid.innerHTML = '';
    updateCount();
    clearState();
  });

  masterVol.addEventListener('input', ()=>{
    pads.forEach(p=>{ if(!p.audio.paused) p.audio.volume = parseFloat(masterVol.value); });
  });

  const lockBtn = document.getElementById('lockBtn');
  let locked = false;

  fadeTime.addEventListener('input', ()=>{
    fadeTimeLabel.textContent = fadeTime.value + 'ms';
  });
  lockBtn.addEventListener('click', ()=>{
    locked = !locked;
    document.body.classList.toggle('locked', locked);
    lockBtn.classList.toggle('locked', locked);
    lockBtn.textContent = locked ? '🔒 ロック中' : '🔓 ロック';
    // CSSのpointer-events:noneだけではiPad Safariでcontenteditableのタッチ入力を
    // 完全に防げない場合があるため、属性自体も確実に切り替える
    pads.forEach(p=>{
      const nameEl = p.el.querySelector('.name');
      if(nameEl){
        if(locked) nameEl.blur();
        nameEl.setAttribute('contenteditable', locked ? 'false' : 'true');
      }
    });
  });

  document.addEventListener('keydown', (e)=>{
    if(e.target.isContentEditable) return;
    const k = e.key.toLowerCase();
    if(k === 'escape'){ pads.forEach(p=>stopPad(p)); return; }
    if(e.key === ' '){
      e.preventDefault();
      const playing = pads.find(p => !p.audio.paused || p.fadeFrame || p.el.classList.contains('paused-sp'));
      if(playing){
        if(!playing.audio.paused){
          playing.audio.pause();
          playing.el.classList.remove('playing');
          playing.el.classList.add('paused-sp');
        } else if(playing.el.classList.contains('paused-sp')){
          playing.audio.play();
          playing.el.classList.add('playing');
          playing.el.classList.remove('paused-sp');
        }
      }
      return;
    }
    const pad = pads.find(p=>p.key === k);
    if(pad){ e.preventDefault(); togglePad(pad); }
  });

  // ---- 起動時に保存済みの状態を自動復元 ----
  (async function restoreState(){
    const data = await loadState();
    if(data && data.length){
      data.forEach(item=>{
        if(!item.blob) return;
        // 保存されたBlobに元のファイル名を付け直してFileオブジェクトとして復元
        const file = new File([item.blob], item.filename || item.name || 'audio', { type: item.blob.type });
        const pad = buildPad(file, item.name, item.loop, pads.length);
        pads.push(pad);
        grid.appendChild(pad.el);
      });
    }
    updateCount();
  })();
})();
</script>

</body>
</html>
